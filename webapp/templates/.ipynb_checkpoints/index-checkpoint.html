<!DOCTYPE html>
<html>
<head>
    <title>CIFAR-10 Classifier</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>CIFAR-10 Image Classifier</h1>
    <form id="upload-form" enctype="multipart/form-data">
        <input type="file" name="file" id="file" required>
        <button type="submit">Predict</button>
    </form>
    <div id="result"></div>
    <img src="{{ url_for('static', filename='confusion_matrix.png') }}" alt="Confusion Matrix">
    <script>
        document.getElementById("upload-form").onsubmit = async function(e) {
            e.preventDefault();
            let formData = new FormData(this);
            let response = await fetch("/predict", { method: "POST", body: formData });
            let result = await response.json();
            document.getElementById("result").innerHTML =
                "Prediction: " + result.class + "<br>Confidence: " + (result.confidence*100).toFixed(2) + "%";
        };
    </script>
</body>
</html>
